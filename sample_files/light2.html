<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            font-family: 'Space Grotesk', sans-serif;
            background-color: #f6f6f6;
        }
        .brutalist-shadow:active {
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0px 0px rgba(45,47,47,1);
        }
        .data-laser-gradient {
            background: linear-gradient(135deg, #4e6300 0%, #c3f400 100%);
        }

    body {

<body class="bg-background text-on-surface">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 right-0 z-50 h-16 bg-[#f6f6f6] flex justify-between items-center px-6">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface">menu</span>
<h1 class="text-2xl font-black tracking-tighter text-[#2d2f2f] uppercase">PERFORMANCE</h1>
</div>
<div class="flex items-center gap-4">
<div class="bg-secondary-container px-3 py-1 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span class="font-bold text-sm">42:15</span>
</div>
<span class="material-symbols-outlined text-on-surface">account_circle</span>
</div>
</header>
<main class="pt-20 pb-24 px-4 max-w-2xl mx-auto">
<!-- Timer Section (Hero Metric) -->
<section class="mb-12">
<div class="flex flex-col items-center justify-center py-8 bg-surface-container-lowest border-r-4 border-secondary-fixed">
<span class="label-sm font-bold tracking-widest text-on-surface-variant mb-2">זמן מנוחה</span>
<div class="text-[5rem] font-black leading-none tracking-tighter text-on-surface">
                    01:45
                </div>
<div class="mt-4 flex gap-4">
<button class="bg-surface-container-high px-6 py-2 font-bold text-sm brutalist-shadow transition-all">
                        +30 ש'
                    </button>
<button class="bg-surface-container-high px-6 py-2 font-bold text-sm brutalist-shadow transition-all">
                        דילוג
                    </button>
</div>
</div>
</section>
<!-- Exercise Details -->
<section class="mb-10">
<div class="flex justify-between items-end mb-6">
<div>
<span class="label-sm font-bold text-secondary uppercase tracking-widest block mb-1">תרגיל 2 מתוך 6</span>
<h2 class="text-4xl font-extrabold tracking-tight text-on-surface">לחיצת חזה</h2>
</div>
<button class="text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined">info</span>
<span class="text-xs font-bold uppercase tracking-tighter">מדריך</span>
</button>
</div>
<!-- Set Table Header -->
<div class="grid grid-cols-12 gap-2 px-2 mb-2 text-on-surface-variant">
<div class="col-span-2 text-right label-sm font-black">סט</div>
<div class="col-span-4 text-center label-sm font-black">משקל (ק"ג)</div>
<div class="col-span-4 text-center label-sm font-black">חזרות</div>
<div class="col-span-2"></div>
</div>
<!-- Set Rows -->
<div class="space-y-2">
<!-- Completed Set -->
<div class="grid grid-cols-12 gap-2 items-center bg-surface-container p-2">
<div class="col-span-2 text-center font-black text-xl italic opacity-30">1</div>
<div class="col-span-4 flex flex-col items-center">
<span class="text-xl font-bold">85</span>
<span class="text-[10px] text-outline uppercase font-bold tracking-tighter">אחרון: 80</span>
</div>
<div class="col-span-4 flex flex-col items-center">
<span class="text-xl font-bold">8</span>
<span class="text-[10px] text-outline uppercase font-bold tracking-tighter">אחרון: 8</span>
</div>
<div class="col-span-2 flex justify-center">
<div class="bg-secondary p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
</div>
<!-- Active Set -->
<div class="grid grid-cols-12 gap-2 items-center bg-surface-container-lowest p-2 border-r-4 border-secondary">
<div class="col-span-2 text-center font-black text-xl italic">2</div>
<div class="col-span-4">
<input class="w-full text-center bg-surface-container border-0 text-xl font-bold focus:ring-2 focus:ring-secondary p-3" type="number" value="85"/>
<div class="text-[10px] text-center text-outline font-bold mt-1">אחרון: 80ק"ג</div>
</div>
<div class="col-span-4">
<input class="w-full text-center bg-surface-container border-0 text-xl font-bold focus:ring-2 focus:ring-secondary p-3" placeholder="8" type="number"/>
<div class="text-[10px] text-center text-outline font-bold mt-1">אחרון: 8</div>
</div>
<div class="col-span-2 flex justify-center">
<button class="bg-secondary-container w-full h-full aspect-square flex items-center justify-center brutalist-shadow transition-all group">
<span class="material-symbols-outlined text-on-secondary-fixed text-2xl group-active:scale-90">check</span>
</button>
</div>
</div>
<!-- Future Set -->
<div class="grid grid-cols-12 gap-2 items-center bg-surface-container-low p-2 opacity-60">
<div class="col-span-2 text-center font-black text-xl italic">3</div>
<div class="col-span-4">
<input class="w-full text-center bg-transparent border-0 text-xl font-bold p-3" disabled="" placeholder="--" type="number"/>
</div>
<div class="col-span-4">
<input class="w-full text-center bg-transparent border-0 text-xl font-bold p-3" disabled="" placeholder="--" type="number"/>
</div>
<div class="col-span-2 flex justify-center">
<div class="bg-surface-variant w-full h-full aspect-square flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-2xl">check</span>
</div>
</div>
</div>
</div>
<!-- Add Set Button -->
<button class="w-full mt-6 py-4 border-2 border-dashed border-outline-variant flex items-center justify-center gap-2 font-bold text-sm uppercase tracking-widest text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
                הוסף סט
            </button>
</section>
<!-- Secondary Exercise Tease -->
<section class="mt-12 bg-surface-container-high p-6 flex justify-between items-center">
<div>
<span class="label-sm font-bold text-on-surface-variant uppercase tracking-widest">הבא בתור</span>
<p class="text-xl font-extrabold uppercase tracking-tight">מתח רחב</p>
</div>
<div class="w-16 h-16 bg-surface-container">
<img class="w-full h-full object-cover grayscale opacity-50" data-alt="Close-up of weightlifter hands reaching for a pull-up bar in a dark high-performance gym setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBq0Kfcg2VjqybphoRzELwPu2_0vclWurzxkxpzVMNZbxpFHPHj21SM4PTShlUhnAtToTXmMYDtdANDUrOng2xTTSSF3T6By10F-vVZu7oDT5Lea5j9OGP5vIf_demJje6NhEbFtje_2gNS7M8w0uCXA1TUgeijrtVcJfhTihACngR_Nwf_v9E-iSyk7egvtghSKW_3DX4bRis4UYYxxoqxJ7M0D_6fBG_2FySSoidM-9eWdtR6uweMSVi1EBo3nFFUaF_Wy2ek7YY"/>
</div>
</section>
<!-- Final Action -->
<div class="mt-8">
<button class="w-full py-6 bg-on-surface text-secondary-fixed text-xl font-black uppercase tracking-widest brutalist-shadow transition-all">
                סיים אימון
            </button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-stretch h-20 px-0 pb-safe bg-[#f6f6f6] z-50">

<span class="material-symbols-outlined" data-icon="copy_all">copy_all</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">Templates</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#CCFF00] text-[#2d2f2f] p-3 h-full w-1/4" href="#">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">Workout</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d2f2f] opacity-70 p-3 h-full hover:bg-[#dbdddd] w-1/4" href="#">
<span class="material-symbols-outlined" data-icon="local_library">local_library</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2d2f2f] opacity-70 p-3 h-full hover:bg-[#dbdddd] w-1/4" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest uppercase mt-1">History</span>
</a>
</nav>
</body></html>
